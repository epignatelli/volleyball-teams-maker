<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f1117" />
  <title>Apps — Roots</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../shared.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #0f1117;
      --border: rgba(255,255,255,0.07);
      --text:   #f0f2f8;
      --muted:  #7a80a0;
      --amber:  #F0A500;
      --sport:  'Barlow Condensed', system-ui, sans-serif;
    }

    body {
      font-family: var(--sport);
      background: var(--bg); color: var(--text);
      min-height: 100dvh; -webkit-font-smoothing: antialiased;
      display: flex; flex-direction: column;
    }

    /* ── Top bar ── */
    .topbar {
      padding: 0 24px; height: 54px;
      display: flex; align-items: center; gap: 12px;
      border-bottom: 1px solid var(--border);
    }
    .brand {
      font-size: 14px; font-weight: 800;
      letter-spacing: .18em; text-transform: uppercase;
      color: var(--amber); text-decoration: none;
    }
    .back {
      background: none; border: none; cursor: pointer;
      color: var(--muted); font-size: 20px; line-height: 1;
      padding: 4px 0; text-decoration: none;
    }

    /* ── Content ── */
    .page-content { padding: 32px 24px; flex: 1; }
    .page-title {
      font-size: clamp(36px, 10vw, 64px);
      font-weight: 900; line-height: .92;
      letter-spacing: -.01em; text-transform: uppercase;
      margin-bottom: 32px;
    }

    /* ── Nav rows (shared) ── */
    .nav-row {
      display: grid;
      grid-template-columns: 1fr auto;
      grid-template-rows: auto auto;
      align-items: center;
      padding: 15px 0;
      border-top: 1px solid var(--border);
      text-decoration: none; color: inherit;
      column-gap: 12px; row-gap: 2px;
    }
    .nav-row:last-child { border-bottom: 1px solid var(--border); }
    .nav-name {
      font-size: 21px; font-weight: 700;
      letter-spacing: .03em; text-transform: uppercase;
      grid-column: 1; grid-row: 1;
    }
    .nav-desc {
      font-size: 13px; font-weight: 400;
      color: var(--muted); letter-spacing: 0;
      grid-column: 1; grid-row: 2;
    }
    .nav-arrow {
      font-size: 18px; font-weight: 400; color: var(--muted);
      grid-column: 2; grid-row: 1 / 3;
      transition: transform .15s, color .15s;
    }
    .nav-row:hover .nav-arrow { transform: translateX(4px); color: var(--text); }


    @media (prefers-reduced-motion: reduce) { .nav-arrow { transition: none; } }
  </style>
</head>
<body>

  <nav class="topbar">
    <a class="back" href="../">←</a>
    <a class="brand" href="../">Roots</a>
  </nav>

  <main class="page-content">
    <h1 class="page-title">Apps</h1>

    <a class="nav-row" href="../vb-lineups/">
      <span class="nav-name">Lineups</span>
      <span class="nav-desc">Build valid rotation lineups for mixed volleyball</span>
      <span class="nav-arrow">→</span>
    </a>
    <a class="nav-row" href="../kqotc/">
      <span class="nav-name">KQOTC</span>
      <span class="nav-desc">Run King / Queen of the Court events</span>
      <span class="nav-arrow">→</span>
    </a>
  </main>

  <footer class="roots-footer">
    <span class="roots-footer-link dim">About</span>
    <span class="roots-footer-dot">·</span>
    <span class="roots-footer-link dim">Policy</span>
  </footer>

</body>
</html>
