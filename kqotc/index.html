<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f1117" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="KQOTC" />
  <title>Roots | KQOTC</title>
  <link rel="manifest" href="./manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./style.css" />
  <link rel="stylesheet" href="../shared.css" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
</head>
<body>

<!-- ══════════════════════════════════════════════════
     SCREEN 0 — HOME
══════════════════════════════════════════════════ -->
<div class="screen active" id="screen-home">

  <div class="app-topbar">
    <div class="topbar-row">
      <div class="topbar-left">
        <a class="nav-home" href="../">Roots</a>
        <span class="nav-screen-title">KQOTC</span>
      </div>
      <div class="topbar-right">
        <button class="auth-btn" id="auth-btn" onclick="handleAuthClick()">Sign in</button>
      </div>
    </div>
  </div>

  <div class="home-content" id="home-content">
    <div class="home-empty">Loading…</div>
  </div>

  <div class="footer">
    <button class="cta-btn" id="home-new-event-btn" onclick="showCreateForm()" style="display:none">+ New event</button>
  </div>
  <footer class="roots-footer">
    <a class="roots-footer-link" href="../">Roots</a>
    <span class="roots-footer-dot">·</span>
    <span class="roots-footer-link dim">About</span>
    <span class="roots-footer-dot">·</span>
    <span class="roots-footer-link dim">Policy</span>
  </footer>

  <!-- Create event slide-up panel -->
  <div class="qr-overlay" id="create-overlay">
    <div class="qr-panel">
      <div class="qr-header">
        <span class="qr-title">New event</span>
        <button class="qr-close" onclick="hideCreateForm()">✕</button>
      </div>
      <div style="width:100%;display:flex;flex-direction:column;gap:10px">
        <input class="create-input" type="text" id="create-name" placeholder="Tournament name" maxlength="40"
          autocomplete="off" autocorrect="off" spellcheck="false" />
        <input class="create-input" type="date" id="create-date" />
      </div>
      <button class="cta-btn" onclick="submitCreateTournament()">Create &amp; open check-in →</button>
    </div>
  </div>

</div>


<!-- ══════════════════════════════════════════════════
     SCREEN 1 — CHECK-IN
══════════════════════════════════════════════════ -->
<div class="screen" id="screen-checkin">

  <div class="app-topbar">
    <div class="topbar-row">
      <div class="topbar-left">
        <a class="nav-home" href="../">Roots</a>
        <button class="nav-back" onclick="goHome()">←</button>
        <span class="nav-screen-title" id="checkin-tournament-name"></span>
      </div>
    </div>
  </div>

  <div class="checkin-content">

    <div class="section" id="add-player-section">
      <div class="step-label">Check-in</div>
      <div class="add-row">
        <input type="text" id="player-input" placeholder="Player name" maxlength="24"
          autocomplete="off" autocorrect="off" autocapitalize="words" spellcheck="false" />
        <button class="add-btn" onclick="addPlayer()">+</button>
      </div>
    </div>

    <div class="section">
      <div class="roster-header">
        <div style="display:flex;align-items:center;gap:8px">
          <span class="step-label" style="margin-bottom:0">Players</span>
          <span class="roster-count" id="player-count"></span>
        </div>
        <div style="display:flex;align-items:center;gap:6px">
          <span class="court-hint" id="court-hint"></span>
          <span id="admin-roster-actions" style="display:none">
            <button class="danger-btn" onclick="resetScores()">Reset scores</button>
            <button class="danger-btn" onclick="clearPlayers()">Clear all</button>
          </span>
        </div>
      </div>
      <div id="player-list" class="player-list"></div>
      <div id="player-empty" class="empty-state">No players yet</div>
    </div>

  </div>

  <div class="debug-bar" style="display:none">
    <span class="debug-label">DEBUG</span>
    <input id="debug-n" class="debug-input" type="number" value="24" min="1" max="60" inputmode="numeric" />
    <button class="debug-btn" onclick="debugFillPlayers()">Fill players</button>
  </div>

  <div class="footer" style="flex-direction:column;gap:8px">
    <div style="display:flex;gap:8px">
      <button class="cta-btn secondary-btn" onclick="openJoinPage()">Join →</button>
      <button class="cta-btn secondary-btn" id="qr-checkin-btn" onclick="openQRCheckin()" style="display:none">QR check-in</button>
    </div>
    <button class="cta-btn" id="start-btn" onclick="startEvent()" style="display:none" disabled>Start event</button>
  </div>
  <footer class="roots-footer">
    <a class="roots-footer-link" href="../">Roots</a>
    <span class="roots-footer-dot">·</span>
    <span class="roots-footer-link dim">About</span>
    <span class="roots-footer-dot">·</span>
    <span class="roots-footer-link dim">Policy</span>
  </footer>

  <!-- QR check-in overlay -->
  <div class="qr-overlay" id="qr-overlay">
    <div class="qr-panel">
      <div class="qr-header">
        <span class="qr-title">Scan to check in</span>
        <button class="qr-close" onclick="closeQRCheckin()">✕</button>
      </div>
      <div class="qr-code-wrap">
        <img id="qr-img" src="" alt="QR code" width="200" height="200" />
      </div>
      <div class="qr-session-label">Code: <strong id="qr-code-text"></strong></div>
      <input class="qr-url-input" id="qr-join-url" type="text" readonly />
      <div class="qr-status" id="qr-status">Waiting for players…</div>
      <div class="qr-player-list" id="qr-player-list"></div>
      <button class="cta-btn" onclick="closeQRCheckin()">Done</button>
    </div>
  </div>

</div>


<!-- ══════════════════════════════════════════════════
     SCREEN 2 — ACTIVE ROUND
══════════════════════════════════════════════════ -->
<div class="screen" id="screen-round">

  <div class="app-topbar">
    <div class="topbar-row">
      <div class="topbar-left">
        <a class="nav-home" href="../">Roots</a>
        <button class="nav-back" onclick="goHome()">←</button>
        <div>
          <div class="nav-screen-title" id="round-title">Round 1</div>
          <div class="nav-subtitle" id="round-subtitle"></div>
        </div>
      </div>
      <div class="topbar-right">
        <button class="end-event-btn" onclick="endEvent()">End event</button>
      </div>
    </div>
  </div>

  <div class="round-content" id="round-content"></div>

  <div class="debug-bar" style="display:none">
    <span class="debug-label">DEBUG</span>
    <button class="debug-btn" onclick="debugRandomScores()">Random scores</button>
  </div>

  <div class="footer">
    <button class="cta-btn" onclick="endRound()">End round →</button>
  </div>
  <footer class="roots-footer">
    <a class="roots-footer-link" href="../">Roots</a>
    <span class="roots-footer-dot">·</span>
    <span class="roots-footer-link dim">About</span>
    <span class="roots-footer-dot">·</span>
    <span class="roots-footer-link dim">Policy</span>
  </footer>
</div>


<!-- ══════════════════════════════════════════════════
     SCREEN 3 — TRANSITION
══════════════════════════════════════════════════ -->
<div class="screen" id="screen-transition">

  <div class="app-topbar">
    <div class="topbar-row">
      <div class="topbar-left">
        <a class="nav-home" href="../">Roots</a>
        <button class="nav-back" onclick="goHome()">←</button>
        <span class="nav-screen-title" id="transition-title">Round 1 done</span>
      </div>
    </div>
  </div>

  <div class="round-content" id="transition-content"></div>

  <div class="footer" style="flex-direction:column;gap:8px">
    <div style="display:flex;gap:8px">
      <button class="cta-btn secondary-btn" onclick="showScreen('round')">← Back</button>
      <button class="cta-btn" onclick="startNextRound()">Round <span id="next-round-num">2</span> →</button>
    </div>
    <button class="end-tourney-btn" onclick="endEvent()">End tournament &amp; see results</button>
  </div>
  <footer class="roots-footer">
    <a class="roots-footer-link" href="../">Roots</a>
    <span class="roots-footer-dot">·</span>
    <span class="roots-footer-link dim">About</span>
    <span class="roots-footer-dot">·</span>
    <span class="roots-footer-link dim">Policy</span>
  </footer>
</div>


<!-- ══════════════════════════════════════════════════
     SCREEN 4 — LEADERBOARD
══════════════════════════════════════════════════ -->
<div class="screen" id="screen-leaderboard">

  <div class="app-topbar">
    <div class="topbar-row">
      <div class="topbar-left">
        <a class="nav-home" href="../">Roots</a>
        <button class="nav-back" onclick="goHome()">←</button>
        <span class="nav-screen-title">Results</span>
      </div>
    </div>
  </div>

  <div class="round-content" id="leaderboard-content"></div>
  <footer class="roots-footer">
    <a class="roots-footer-link" href="../">Roots</a>
    <span class="roots-footer-dot">·</span>
    <span class="roots-footer-link dim">About</span>
    <span class="roots-footer-dot">·</span>
    <span class="roots-footer-link dim">Policy</span>
  </footer>

</div>

<script src="./logic.js"></script>
<script src="./app.js"></script>
</body>
</html>
