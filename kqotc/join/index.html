<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f1117" />
  <title>KQOTC Check-in</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    button, input { touch-action: manipulation; }
    :root {
      --bg: #0f1117; --surface: #1a1d27; --surface2: #22263a;
      --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.14);
      --text: #f0f2f8; --muted: #7a80a0;
      --amber: #f5a623; --green: #22c97a; --green-bg: rgba(34,201,122,0.13);
      --red: #f87171;
      --radius-md: 12px; --radius-lg: 18px; --pill: 999px;
      --sport: 'Barlow Condensed', system-ui, sans-serif;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100dvh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 32px 24px; gap: 32px;
      -webkit-font-smoothing: antialiased;
    }
    .logo-row { display: flex; align-items: center; gap: 12px; }
    .logo {
      width: 44px; height: 44px; background: var(--amber);
      border-radius: 12px; display: flex; align-items: center; justify-content: center;
    }
    .logo svg { width: 24px; height: 24px; }
    .logo-row h1 {
      font-family: var(--sport); font-size: 28px; font-weight: 700;
      letter-spacing: .02em; text-transform: uppercase;
    }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 28px 24px;
      width: 100%; max-width: 360px;
      display: flex; flex-direction: column; gap: 16px;
    }
    .card-label {
      font-family: var(--sport); font-size: 13px; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase; color: var(--muted);
    }
    input[type=text], input[type=number] {
      width: 100%; height: 52px;
      background: var(--surface2); border: 1.5px solid var(--border2);
      border-radius: var(--radius-md); padding: 0 16px;
      font-size: 18px; color: var(--text);
      outline: none; -webkit-appearance: none; transition: border-color .15s;
    }
    input[type=number] { text-align: center; font-size: 28px; font-family: var(--sport); }
    input:focus { border-color: var(--amber); }
    input::placeholder { color: var(--muted); }
    .error-msg { color: var(--red); font-size: 13px; display: none; }
    .cta-btn {
      width: 100%; height: 52px; border-radius: var(--radius-lg); border: none;
      background: linear-gradient(90deg, var(--amber) 0%, #e8920a 100%);
      color: #0f1117; font-family: var(--sport);
      font-size: 18px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
      cursor: pointer; transition: opacity .15s;
    }
    .cta-btn:disabled { opacity: .35; cursor: default; }
    .cta-btn:not(:disabled):active { opacity: .8; }
    .state-card {
      display: flex; flex-direction: column; align-items: center;
      gap: 16px; text-align: center;
    }
    .state-icon {
      width: 68px; height: 68px; background: var(--green-bg); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 32px;
    }
    .state-icon.amber { background: rgba(245,166,35,0.13); }
    .state-h { font-family: var(--sport); font-size: 26px; font-weight: 700; letter-spacing: .02em; }
    .state-p { color: var(--muted); font-size: 14px; line-height: 1.5; }
  </style>
</head>
<body>

  <div class="logo-row">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="#0f1117" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 20h18"/>
        <path d="M5 20 3 11l5 3.5L12 6l4 8.5L21 11l-2 9"/>
      </svg>
    </div>
    <h1>KQOTC</h1>
  </div>

  <div class="card" id="main-card">
    <div class="card-label">Loading…</div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script>
    firebase.initializeApp({
      apiKey: "AIzaSyBNxICoyaaRscb2-wHBwU52dxlNOQIRRdk",
      authDomain: "roots-kqotc.firebaseapp.com",
      projectId: "roots-kqotc",
      storageBucket: "roots-kqotc.firebasestorage.app",
      messagingSenderId: "1026148896358",
      appId: "1:1026148896358:web:a8b5067a7b353b93ade7a7"
    });
  </script>
  <script>
    const params       = new URLSearchParams(location.search);
    const tournamentId = params.get('t');
    const card         = document.getElementById('main-card');

    if (!tournamentId) {
      card.innerHTML = `
        <span class="card-label">Check-in</span>
        <p style="color:var(--muted);font-size:14px;line-height:1.6">
          Invalid link — ask your organiser for the QR code.
        </p>`;
    } else {
      let _tourUnsub     = null;
      let _submittedRound = null;

      firebase.auth().onAuthStateChanged(async user => {
        if (!user) { await firebase.auth().signInAnonymously(); return; }

        const db        = firebase.firestore();
        const tourRef   = db.collection('tournaments').doc(tournamentId);
        const playerRef = tourRef.collection('players').doc(user.uid);

        const [tourDoc, playerDoc] = await Promise.all([tourRef.get(), playerRef.get()]);
        const tname = tourDoc.exists ? (tourDoc.data().name || '') : '';

        if (playerDoc.exists) {
          _submittedRound = playerDoc.data().submittedRound ?? null;
          _listen(user, tourRef, playerRef, playerDoc.data().name);
        } else {
          _showForm(tname, user, tourRef, playerRef);
        }
      });

      function _listen(user, tourRef, playerRef, playerName) {
        if (_tourUnsub) _tourUnsub();
        _tourUnsub = tourRef.onSnapshot(doc => {
          if (!doc.exists) return;
          const data   = doc.data();
          const screen = data.screen || 'checkin';
          const round  = data.round  || 0;

          if (screen === 'round') {
            _submittedRound = null;
            _showRoundLive(round, playerName);
          } else if (screen === 'transition') {
            if (_submittedRound === round) {
              _showSubmitted(playerName);
            } else {
              const myTeam   = (data.topTeams || []).find(t => t.playerIds?.includes(user.uid));
              const myWorkUp = (data.workUp   || []).find(w => w.playerId === user.uid);
              if (myTeam || myWorkUp) {
                _showScoreInput(round, playerRef, playerName);
              } else {
                _showWaiting(playerName, 'Round done! Waiting for next round…');
              }
            }
          } else if (screen === 'leaderboard') {
            _showDone(playerName);
          } else {
            _showWaiting(playerName, 'Waiting for the event to start…');
          }
        });
      }

      function _showForm(tname, user, tourRef, playerRef) {
        card.innerHTML = `
          <span class="card-label">${tname || 'Check-in'}</span>
          <input type="text" id="name-input" placeholder="Your name" maxlength="24"
            autocomplete="off" autocorrect="off" autocapitalize="words" spellcheck="false" />
          <div class="error-msg" id="error-msg">Please enter your name.</div>
          <button class="cta-btn" id="checkin-btn" onclick="checkIn()">Join →</button>`;
        const inp = document.getElementById('name-input');
        inp.addEventListener('keydown', e => { if (e.key === 'Enter') checkIn(); });
        inp.focus();

        window.checkIn = async function() {
          const name  = inp.value.trim();
          const errEl = document.getElementById('error-msg');
          if (!name) { errEl.style.display = 'block'; inp.focus(); return; }
          errEl.style.display = 'none';
          document.getElementById('checkin-btn').disabled = true;
          inp.disabled = true;
          try {
            await playerRef.set({ name, cumScore: 0, joinedAt: firebase.firestore.FieldValue.serverTimestamp() });
            await tourRef.update({ playerCount: firebase.firestore.FieldValue.increment(1) });
            _listen(user, tourRef, playerRef, name);
          } catch(e) {
            console.error('Join failed:', e);
            document.getElementById('checkin-btn').disabled = false;
            inp.disabled = false;
            errEl.textContent = 'Something went wrong. Try again.';
            errEl.style.display = 'block';
          }
        };
      }

      function _showWaiting(name, msg) {
        card.innerHTML = `
          <div class="state-card">
            <div class="state-icon">✓</div>
            <div class="state-h">You're in, ${name.split(' ')[0]}!</div>
            <div class="state-p">${msg}</div>
          </div>`;
      }

      function _showRoundLive(round, name) {
        card.innerHTML = `
          <div class="state-card">
            <div class="state-icon amber">🏐</div>
            <div class="state-h">Round ${round} is live!</div>
            <div class="state-p">Get to the court, ${name.split(' ')[0]}.</div>
          </div>`;
      }

      function _showScoreInput(round, playerRef, name) {
        card.innerHTML = `
          <span class="card-label">Round ${round} done</span>
          <p style="color:var(--muted);font-size:14px">How many points did your team score?</p>
          <input type="number" id="score-input" inputmode="numeric" min="0" max="99" placeholder="0" />
          <div class="error-msg" id="score-error">Enter a valid score.</div>
          <button class="cta-btn" id="score-btn" onclick="submitScore()">Submit score</button>`;
        const inp = document.getElementById('score-input');
        inp.addEventListener('keydown', e => { if (e.key === 'Enter') submitScore(); });
        inp.focus();

        window.submitScore = async function() {
          const val   = parseInt(inp.value);
          const errEl = document.getElementById('score-error');
          if (isNaN(val) || val < 0) { errEl.style.display = 'block'; return; }
          errEl.style.display = 'none';
          document.getElementById('score-btn').disabled = true;
          try {
            await playerRef.update({ submittedScore: val, submittedRound: round });
            _submittedRound = round;
            _showSubmitted(name);
          } catch(e) {
            console.error('Score submit failed:', e);
            document.getElementById('score-btn').disabled = false;
            errEl.textContent = 'Failed to submit. Try again.';
            errEl.style.display = 'block';
          }
        };
      }

      function _showSubmitted(name) {
        card.innerHTML = `
          <div class="state-card">
            <div class="state-icon">✓</div>
            <div class="state-h">Score submitted!</div>
            <div class="state-p">Waiting for next round, ${name.split(' ')[0]}.</div>
          </div>`;
      }

      function _showDone(name) {
        card.innerHTML = `
          <div class="state-card">
            <div class="state-icon amber">♛</div>
            <div class="state-h">That's a wrap!</div>
            <div class="state-p">Great game, ${name.split(' ')[0]}. Check the leaderboard.</div>
          </div>`;
      }
    }
  </script>

</body>
</html>
