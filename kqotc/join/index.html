<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f1117" />
  <title>KQOTC Check-in</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    button, input { touch-action: manipulation; }
    :root {
      --bg: #0f1117; --surface: #1a1d27; --surface2: #22263a;
      --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.14);
      --text: #f0f2f8; --muted: #7a80a0;
      --amber: #f5a623; --green: #22c97a; --green-bg: rgba(34,201,122,0.13);
      --red: #f87171;
      --radius-md: 12px; --radius-lg: 18px; --pill: 999px;
      --sport: 'Barlow Condensed', system-ui, sans-serif;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100dvh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 32px 24px; gap: 32px;
      -webkit-font-smoothing: antialiased;
    }
    .logo-row { display: flex; align-items: center; gap: 12px; }
    .logo {
      width: 44px; height: 44px; background: var(--amber);
      border-radius: 12px; display: flex; align-items: center; justify-content: center;
    }
    .logo svg { width: 24px; height: 24px; }
    .logo-row h1 {
      font-family: var(--sport); font-size: 28px; font-weight: 700;
      letter-spacing: .02em; text-transform: uppercase;
    }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 28px 24px;
      width: 100%; max-width: 360px;
      display: flex; flex-direction: column; gap: 16px;
    }
    .card-label {
      font-family: var(--sport); font-size: 13px; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase; color: var(--muted);
    }
    input[type=text] {
      width: 100%; height: 52px;
      background: var(--surface2); border: 1.5px solid var(--border2);
      border-radius: var(--radius-md); padding: 0 16px;
      font-size: 18px; color: var(--text);
      outline: none; -webkit-appearance: none; transition: border-color .15s;
    }
    input[type=text]:focus { border-color: var(--amber); }
    input[type=text]::placeholder { color: var(--muted); }
    .error-msg { color: var(--red); font-size: 13px; display: none; }
    .cta-btn {
      width: 100%; height: 52px; border-radius: var(--radius-lg); border: none;
      background: linear-gradient(90deg, var(--amber) 0%, #e8920a 100%);
      color: #0f1117; font-family: var(--sport);
      font-size: 18px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
      cursor: pointer; transition: opacity .15s;
    }
    .cta-btn:disabled { opacity: .35; cursor: default; }
    .cta-btn:not(:disabled):active { opacity: .8; }
    .success {
      display: none; flex-direction: column; align-items: center;
      gap: 16px; text-align: center;
    }
    .success-icon {
      width: 68px; height: 68px; background: var(--green-bg); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 34px; color: var(--green);
    }
    .success h2 {
      font-family: var(--sport); font-size: 26px; font-weight: 700; letter-spacing: .02em;
    }
    .success p { color: var(--muted); font-size: 14px; }
  </style>
</head>
<body>

  <div class="logo-row">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="#0f1117" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 20h18"/>
        <path d="M5 20 3 11l5 3.5L12 6l4 8.5L21 11l-2 9"/>
      </svg>
    </div>
    <h1>KQOTC</h1>
  </div>

  <div class="card" id="main-card">
    <!-- filled by JS -->
  </div>

  <script>
    function Gun(relays) {
      // Lazy-load Gun.js only when needed (production fallback)
      return {
        _relays: relays, _loaded: false,
        _instance: null,
        _get(cb) {
          if (this._instance) return cb(this._instance);
          const s = document.createElement('script');
          s.src = 'https://cdn.jsdelivr.net/npm/gun/gun.js';
          s.onload = () => { this._instance = window.Gun(this._relays); cb(this._instance); };
          document.head.appendChild(s);
        },
        get(key) { return { _key: key, _gun: this, get(k2) { return { _gun: this._gun, _key: this._key, _k2: k2, set(data) { this._gun._get(g => g.get(this._key).get(this._k2).set(data)); } }; } };
        }
      };
    }
  </script>
  <script>
    const params    = new URLSearchParams(location.search);
    const sessionId = params.get('s');
    const card      = document.getElementById('main-card');

    if (!sessionId) {
      card.innerHTML = `
        <span class="card-label">Check-in</span>
        <p style="color:var(--muted);font-size:14px;line-height:1.6">
          Invalid link — ask your organiser for the QR code.
        </p>`;
    } else {
      card.innerHTML = `
        <span class="card-label">Check-in</span>
        <input type="text" id="name-input" placeholder="Your name" maxlength="24"
          autocomplete="off" autocorrect="off" autocapitalize="words" spellcheck="false" />
        <div class="error-msg" id="error-msg">Please enter your name.</div>
        <button class="cta-btn" id="checkin-btn" onclick="checkIn()">Check in</button>
        <div class="success" id="success">
          <div class="success-icon">✓</div>
          <h2>You're in!</h2>
          <p>See you on the court.</p>
        </div>`;

      document.getElementById('name-input').addEventListener('keydown', e => {
        if (e.key === 'Enter') checkIn();
      });

      async function checkIn() {
        const input = document.getElementById('name-input');
        const name  = input.value.trim();
        const errEl = document.getElementById('error-msg');
        if (!name) { errEl.style.display = 'block'; input.focus(); return; }
        errEl.style.display = 'none';
        document.getElementById('checkin-btn').disabled = true;
        input.disabled = true;

        let ok = false;

        // Try local serve.py first
        try {
          const r = await fetch(`/api/checkin?s=${sessionId}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name }),
          });
          ok = r.ok;
        } catch (e) {}

        // Fall back to Gun.js for production
        if (!ok) {
          const gun = Gun(['https://gun-rs.fly.dev/gun', 'https://peer.wallie.io/gun']);
          gun.get('kqotc-v1-' + sessionId).get('players').set({ name, ts: Date.now() });
          ok = true;
        }

        document.getElementById('name-input').style.display = 'none';
        document.getElementById('checkin-btn').style.display = 'none';
        document.getElementById('success').style.display = 'flex';
      }
    }
  </script>

</body>
</html>
