<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Scoreboard</title>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#111111"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <header id="topbar">
    <a href="../tools/" class="top-btn">←</a>
    <button id="undo-btn" class="top-btn" onclick="undo()" disabled>↩</button>
    <div id="set-label">Set 1</div>
    <div class="top-right">
      <button id="setpoints-btn" class="top-btn" onclick="cycleSetPoints()">25pts</button>
      <button id="bestof-btn" class="top-btn" onclick="toggleBestOf()">Bo5</button>
      <button class="top-btn" onclick="confirmNewMatch()">New</button>
    </div>
  </header>

  <main id="court">
    <div class="panel" id="panel-a" onclick="score('a')">
      <div class="team-header">
        <span class="serve-dot" id="serve-a" onclick="setServe(event,'a')" title="Serving"></span>
        <span class="team-name" id="name-a" onclick="editName(event,'a')">Team A</span>
        <div class="sets-dots" id="sets-a"></div>
      </div>
      <div class="score" id="score-a">0</div>
      <button class="minus-btn" id="minus-a" onclick="unscore(event,'a')">−</button>
    </div>

    <div class="divider" id="divider"></div>

    <div class="panel" id="panel-b" onclick="score('b')">
      <div class="team-header">
        <span class="serve-dot" id="serve-b" onclick="setServe(event,'b')" title="Serving"></span>
        <span class="team-name" id="name-b" onclick="editName(event,'b')">Team B</span>
        <div class="sets-dots" id="sets-b"></div>
      </div>
      <div class="score" id="score-b">0</div>
      <button class="minus-btn" id="minus-b" onclick="unscore(event,'b')">−</button>
    </div>
  </main>

  <footer id="footbar">
    <div id="set-history"></div>
    <div id="target-label"></div>
  </footer>

  <!-- Set won overlay -->
  <div id="set-overlay" class="overlay hidden" onclick="nextSet()">
    <div class="overlay-card">
      <div class="overlay-eyebrow" id="set-eyebrow"></div>
      <div class="overlay-headline" id="set-headline"></div>
      <div class="overlay-score" id="set-score-disp"></div>
      <button class="overlay-btn" onclick="nextSet()">Next set →</button>
    </div>
  </div>

  <!-- Match won overlay -->
  <div id="match-overlay" class="overlay hidden">
    <div class="overlay-card">
      <div class="overlay-eyebrow">Match over</div>
      <div class="overlay-headline" id="match-headline"></div>
      <div class="overlay-score" id="match-score-disp"></div>
      <button class="overlay-btn" onclick="confirmNewMatch()">New match</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
