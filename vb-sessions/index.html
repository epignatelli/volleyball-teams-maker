<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f1117" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Sessions" />
  <title>VB Sessions</title>
  <link rel="manifest" href="./manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./style.css" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
</head>
<body>

<!-- ══════════════════════════════════════════════════
     SCREEN — HOME (session list)
══════════════════════════════════════════════════ -->
<div class="screen active" id="screen-home">

  <header class="app-header">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="#0f1117" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2"/>
        <path d="M16 2v4M8 2v4M3 10h18"/>
      </svg>
    </div>
    <div>
      <h1>Sessions</h1>
      <div class="subtitle">VB Session Manager</div>
    </div>
    <button class="auth-btn" id="auth-btn" onclick="handleAuthClick()">Sign in</button>
  </header>

  <div class="home-content" id="home-content">
    <div class="home-empty">Loading…</div>
  </div>

  <div class="footer">
    <button class="cta-btn" id="home-new-btn" onclick="openSessionForm()" style="display:none">+ New session</button>
  </div>

  <!-- Create / Edit session panel -->
  <div class="overlay" id="session-form-overlay">
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title" id="form-title">New session</span>
        <button class="panel-close" onclick="closeSessionForm()">✕</button>
      </div>
      <div class="form-fields">
        <div class="field-row">
          <div class="field">
            <label class="field-label">Date</label>
            <input class="field-input" type="date" id="form-date" />
          </div>
          <div class="field">
            <label class="field-label">Time</label>
            <input class="field-input" type="time" id="form-time" />
          </div>
        </div>
        <div class="field">
          <label class="field-label">Venue</label>
          <input class="field-input" type="text" id="form-venue" placeholder="e.g. Hampstead Heath Court 3" maxlength="80"
            autocomplete="off" autocorrect="off" spellcheck="false" />
        </div>
        <div class="field">
          <label class="field-label">Description</label>
          <textarea class="field-input field-textarea" id="form-description" placeholder="What to expect, skill level, what to bring…" maxlength="400"></textarea>
        </div>
        <div class="field-row">
          <div class="field">
            <label class="field-label">Coach</label>
            <input class="field-input" type="text" id="form-coach" placeholder="Name" maxlength="60"
              autocomplete="off" autocorrect="off" spellcheck="false" />
          </div>
          <div class="field">
            <label class="field-label">Level</label>
            <select class="field-input field-select" id="form-level">
              <option value="">Any level</option>
              <option value="beginner">Beginner</option>
              <option value="intermediate">Intermediate</option>
              <option value="advanced">Advanced</option>
              <option value="competitive">Competitive</option>
            </select>
          </div>
        </div>
        <div class="field-row">
          <div class="field">
            <label class="field-label">Max players</label>
            <input class="field-input" type="number" id="form-max" min="1" max="100" inputmode="numeric" placeholder="12" />
          </div>
          <div class="field">
            <label class="field-label">Cost (£)</label>
            <input class="field-input" type="number" id="form-cost" min="0" step="0.5" inputmode="decimal" placeholder="0" />
          </div>
        </div>
        <div class="field">
          <label class="field-label">Registration deadline</label>
          <input class="field-input" type="datetime-local" id="form-deadline" />
        </div>
        <div class="field">
          <label class="field-label">Status</label>
          <select class="field-input field-select" id="form-status">
            <option value="open">Open</option>
            <option value="cancelled">Cancelled</option>
          </select>
        </div>
      </div>
      <div class="form-error" id="form-error"></div>
      <button class="cta-btn" id="form-submit-btn" onclick="submitSessionForm()">Create session</button>
    </div>
  </div>

</div>


<!-- ══════════════════════════════════════════════════
     SCREEN — SESSION DETAIL
══════════════════════════════════════════════════ -->
<div class="screen" id="screen-detail">

  <header class="app-header">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="#0f1117" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2"/>
        <path d="M16 2v4M8 2v4M3 10h18"/>
      </svg>
    </div>
    <div>
      <h1>Session</h1>
      <div class="subtitle" id="detail-subtitle"></div>
    </div>
    <button class="back-btn" onclick="goHome()">← Sessions</button>
  </header>

  <div class="detail-content" id="detail-content"></div>

  <div class="footer" id="detail-footer"></div>

</div>
