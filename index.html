<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f1117" />
  <title>Apps</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:       #0f1117;
      --surface:  #1a1d27;
      --border:   rgba(255,255,255,0.07);
      --border2:  rgba(255,255,255,0.14);
      --text:     #f0f2f8;
      --muted:    #7a80a0;
      --green:    #22c97a;
      --sport:    'Barlow Condensed', system-ui, sans-serif;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
    }
    header {
      padding: 32px 24px 24px;
      border-bottom: 1px solid var(--border);
    }
    header h1 {
      font-family: var(--sport);
      font-size: 28px;
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
    }
    header p {
      font-size: 13px;
      color: var(--muted);
      margin-top: 4px;
    }
    .apps {
      padding: 24px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 12px;
    }
    .app-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 20px;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: border-color .15s;
    }
    .app-card:hover { border-color: var(--border2); }
    .app-card-icon {
      width: 48px; height: 48px;
      background: var(--green);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
    }
    .app-card-icon svg { width: 26px; height: 26px; }
    .app-card h2 {
      font-family: var(--sport);
      font-size: 20px;
      font-weight: 700;
      letter-spacing: .03em;
      text-transform: uppercase;
    }
    .app-card p {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
      flex: 1;
    }
    .app-card-open {
      align-self: flex-start;
      font-family: var(--sport);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--green);
    }
  </style>
</head>
<body>
  <header>
    <h1>Apps</h1>
    <p>A collection of tools for volleyball.</p>
  </header>

  <div class="apps">
    <a class="app-card" href="./vb-lineups/">
      <div class="app-card-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#0f1117" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="6" width="20" height="12" rx="1.5" stroke-width="2"/>
          <line x1="12" y1="6" x2="12" y2="18" stroke-width="2.5"/>
          <line x1="7.5" y1="6" x2="7.5" y2="18" stroke-width="1.2"/>
          <line x1="16.5" y1="6" x2="16.5" y2="18" stroke-width="1.2"/>
        </svg>
      </div>
      <h2>VB Lineups</h2>
      <p>Build valid lineups for mixed volleyball. Finds every combination that satisfies your gender rotation rules.</p>
      <span class="app-card-open">Open →</span>
    </a>
  </div>
</body>
</html>
