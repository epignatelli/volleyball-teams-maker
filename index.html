<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f1117" />
  <title>Roots</title>
  <link rel="stylesheet" href="./fonts/barlow-condensed.css" />
  <link rel="stylesheet" href="./shared.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #0f1117;
      --border: rgba(255,255,255,0.07);
      --text:   #f0f2f8;
      --muted:  #7a80a0;
      --amber:  #F0A500;
      --sport:  'Barlow Condensed', system-ui, sans-serif;
    }

    body {
      font-family: var(--sport);
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
    }

    /* ── Top bar ── */
    .topbar { padding: 20px 24px; }
    .brand {
      font-size: 14px; font-weight: 800;
      letter-spacing: .18em; text-transform: uppercase;
      color: var(--amber);
    }

    /* ── Hero ── */
    .hero {
      padding: 40px 24px 52px;
      display: flex; flex-direction: column; gap: 28px;
    }
    .hero h1 {
      font-size: clamp(52px, 15vw, 96px);
      font-weight: 900; line-height: .92;
      letter-spacing: -.01em; text-transform: uppercase;
    }
    .hero-ctas {
      display: flex; gap: 10px;
    }
    .cta {
      flex: 1;
      display: flex; align-items: center; justify-content: space-between;
      background: var(--amber); color: #0f1117;
      text-decoration: none; font-size: 17px; font-weight: 800;
      letter-spacing: .1em; text-transform: uppercase;
      padding: 17px 22px; border-radius: 8px;
      transition: opacity .15s;
    }
    .cta:hover { opacity: .88; }
    .cta.cta-ghost {
      background: transparent; color: var(--text);
      border: 1.5px solid rgba(255,255,255,0.18);
    }
    .cta.cta-ghost:hover { opacity: .7; }

    /* ── Net divider ── */
    .net {
      display: block; width: calc(100% - 48px);
      margin: 0 24px; height: 14px; opacity: .45;
    }

    /* ── Nav rows ── */
    .nav-section {
      padding: 32px 24px 16px;
      display: flex; flex-direction: column;
    }
    .nav-row {
      display: grid;
      grid-template-columns: 1fr auto;
      grid-template-rows: auto auto;
      align-items: center;
      padding: 15px 0;
      border-top: 1px solid var(--border);
      text-decoration: none; color: inherit;
      column-gap: 12px; row-gap: 2px;
      cursor: pointer;
    }
    .nav-row:last-child { border-bottom: 1px solid var(--border); }
    .nav-row.dim { opacity: .38; cursor: default; pointer-events: none; }
    .nav-name {
      font-size: 21px; font-weight: 700;
      letter-spacing: .03em; text-transform: uppercase;
      grid-column: 1; grid-row: 1;
    }
    .nav-desc {
      font-size: 13px; font-weight: 400;
      color: var(--muted);
      grid-column: 1; grid-row: 2;
      letter-spacing: 0;
    }
    .nav-arrow {
      font-size: 18px; font-weight: 400; color: var(--muted);
      grid-column: 2; grid-row: 1 / 3;
      transition: transform .15s, color .15s;
    }
    .nav-badge {
      font-size: 10px; font-weight: 700; letter-spacing: .1em;
      text-transform: uppercase; color: var(--muted);
      grid-column: 2; grid-row: 1 / 3;
      align-self: center;
    }
    .nav-row:not(.dim):hover .nav-arrow { transform: translateX(4px); color: var(--text); }
    .nav-row.featured .nav-name  { color: var(--amber); }
    .nav-row.featured .nav-arrow { color: var(--amber); }
    .nav-row.featured:hover .nav-arrow { opacity: .75; }

    /* ── Footer ── */
    footer { margin-top: auto; }

    @media (prefers-reduced-motion: reduce) {
      .cta, .nav-arrow { transition: none; }
    }
  </style>
</head>
<body>

  <nav class="topbar">
    <span class="brand">Roots</span>
  </nav>

  <main>

    <section class="hero">
      <h1>Volleyball<br>in London,<br>every week.</h1>
      <div class="hero-ctas">
        <a class="cta" href="./vb-sessions/">
          Join in
          <span>→</span>
        </a>
        <a class="cta cta-ghost" href="./vb-sessions/#provider">
          Host with us
          <span>→</span>
        </a>
      </div>
    </section>

    <svg class="net" viewBox="0 0 320 14" preserveAspectRatio="none" aria-hidden="true">
      <line x1="0"   y1="7" x2="320" y2="7" stroke="#F0A500" stroke-width="1.5"/>
      <line x1="0"   y1="0" x2="0"   y2="14" stroke="#F0A500" stroke-width="2.5"/>
      <line x1="320" y1="0" x2="320" y2="14" stroke="#F0A500" stroke-width="2.5"/>
    </svg>

    <section class="nav-section">

      <a class="nav-row featured" href="./vb-sessions/">
        <span class="nav-name">Sessions</span>
        <span class="nav-desc">Sign up and play every week</span>
        <span class="nav-arrow">→</span>
      </a>

      <div class="nav-row dim">
        <span class="nav-name">Learn</span>
        <span class="nav-desc">Drills, tactics, and technique</span>
        <span class="nav-badge">Soon</span>
      </div>

      <a class="nav-row" href="./vb-sessions/#coach">
        <span class="nav-name">Coach with us</span>
        <span class="nav-desc">Lead sessions and grow the community</span>
        <span class="nav-arrow">→</span>
      </a>

      <a class="nav-row" href="./tools/">
        <span class="nav-name">Apps</span>
        <span class="nav-desc">Lineups, KQOTC, and more</span>
        <span class="nav-arrow">→</span>
      </a>

    </section>

  </main>

  <footer class="roots-footer">
    <span class="roots-footer-link dim">About</span>
    <span class="roots-footer-dot">·</span>
    <a class="roots-footer-link" href="./policy/">Policy</a>
  </footer>

</body>
</html>
